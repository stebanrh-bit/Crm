<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MotoCRM — Sistema de Ventas</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f0e0b;--surface:#1a1915;--surface2:#222118;--surface3:#2a2820;
  --border:#2e2c24;--accent:#f5c518;--accent2:#e8a000;
  --text:#f0ead6;--muted:#7a7465;--danger:#ef4444;--success:#22c55e;--info:#3b82f6;
}
[data-theme="light"]{
  --bg:#f5f3ee;--surface:#ffffff;--surface2:#f0ede6;--surface3:#e8e4db;
  --border:#d4cfc4;--text:#1a1915;--muted:#7a7465;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;}
.hidden{display:none!important;}

/* AUTH */
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:40px;width:360px;}
.auth-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:30px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;}
.auth-sub{font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:28px;margin-top:3px;}
.auth-tabs{display:flex;border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:20px;}
.auth-tab{flex:1;padding:9px;text-align:center;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);transition:all .15s;}
.auth-tab.active{background:var(--accent);color:#0f0e0b;}
.auth-error{background:#ef444422;border:1px solid #ef444444;color:#ef4444;border-radius:4px;padding:8px 12px;font-size:12px;margin-bottom:12px;}
.auth-info{background:#3b82f622;border:1px solid #3b82f644;color:#3b82f6;border-radius:4px;padding:8px 12px;font-size:12px;margin-bottom:12px;}

/* LAYOUT */
#app{display:flex;min-height:100vh;}
.sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100;overflow-y:auto;}
.sidebar-logo{padding:22px 20px 18px;border-bottom:1px solid var(--border);}
.logo-tag{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;letter-spacing:2px;color:var(--accent);text-transform:uppercase;line-height:1;}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-top:3px;}
.sidebar-nav{flex:1;padding:12px 0;}
.nav-section{padding:10px 20px 4px;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:14px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);transition:all .15s;border-left:3px solid transparent;}
.nav-item:hover{color:var(--text);background:var(--surface2);}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:rgba(245,197,24,.06);}
.nav-icon{font-size:15px;width:20px;text-align:center;}
.sidebar-footer{padding:14px 20px;border-top:1px solid var(--border);}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:13px;color:#0f0e0b;flex-shrink:0;}
.user-chip{display:flex;align-items:center;gap:10px;}
.user-name{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-width:0;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.page-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;letter-spacing:1px;text-transform:uppercase;}
.page-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.topbar-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.topbar-right{display:flex;align-items:center;gap:8px;}
#content{padding:24px 28px;flex:1;}

/* BUTTONS */
.btn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:1px;text-transform:uppercase;padding:7px 14px;border-radius:4px;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-primary{background:var(--accent);color:#0f0e0b;}
.btn-primary:hover:not(:disabled){background:var(--accent2);}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{color:var(--text);border-color:var(--muted);}
.btn-success{background:#22c55e22;color:#22c55e;border:1px solid #22c55e44;}
.btn-danger{background:#ef444422;color:#ef4444;border:1px solid #ef444444;}
.btn-wa{background:#25D36622;color:#25D366;border:1px solid #25D36644;}
.btn-sm{padding:4px 10px;font-size:11px;}
.theme-toggle{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 8px;cursor:pointer;font-size:16px;}

/* FORMS */
.form-row{margin-bottom:12px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;font-weight:600;}
.form-input,.form-select,.form-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:8px 11px;color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;outline:none;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);}
.form-select option{background:var(--surface2);}
.form-textarea{resize:vertical;min-height:65px;}
.search-input{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:7px 12px;color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;width:200px;outline:none;}
.search-input:focus{border-color:var(--accent);}
.search-input::placeholder{color:var(--muted);}

/* TABLE */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.section-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:19px;letter-spacing:1px;text-transform:uppercase;}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:24px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:500px;}
th{background:var(--surface2);padding:10px 14px;text-align:left;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:rgba(245,197,24,.025);cursor:pointer;}

/* BADGE */
.badge{display:inline-block;padding:2px 9px;border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px;position:relative;overflow:hidden;}
.kpi-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent);}
.kpi-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.kpi-value{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:38px;color:var(--text);line-height:1;}
.kpi-delta{font-size:11px;color:var(--success);margin-top:5px;}
.kpi-icon{position:absolute;right:14px;top:14px;font-size:26px;opacity:.12;}

/* PIPELINE */
.pipeline-board{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
.pipeline-col{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;min-height:380px;}
.pipeline-col-header{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:13px;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid;}
.pipeline-total{font-size:11px;color:var(--muted);font-weight:400;letter-spacing:0;display:block;margin-top:2px;}
.lead-card{background:var(--surface2);border-radius:6px;padding:11px;margin-bottom:8px;cursor:pointer;border:1px solid transparent;transition:transform .1s;}
.lead-card:hover{transform:translateY(-1px);border-color:var(--border);}
.lead-card-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;}
.lead-card-moto{font-size:11px;color:var(--muted);margin-top:2px;}
.lead-card-budget{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;color:var(--accent);margin-top:7px;}
.lead-card-days{font-size:10px;margin-top:4px;}

/* PIPELINE MINI */
.pipeline-mini{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:24px;}
.stage-col{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;}
.stage-header{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.stage-count{background:var(--surface2);border-radius:10px;padding:1px 7px;font-size:11px;color:var(--muted);}
.mini-lead{background:var(--surface2);border-radius:4px;padding:6px 8px;margin-bottom:5px;font-size:12px;border-left:2px solid;}
.mini-lead-name{font-weight:600;}
.mini-lead-moto{color:var(--muted);font-size:11px;margin-top:1px;}

/* INVENTORY */
.inv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.inv-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px;transition:border-color .15s;position:relative;}
.inv-card:hover{border-color:var(--accent);}
.inv-card.stock-low{border-color:#f59e0b;}
.inv-stock-alert{position:absolute;top:10px;right:10px;background:#f59e0b;color:#000;border-radius:3px;padding:2px 7px;font-size:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;}
.inv-moto{font-size:36px;margin-bottom:10px;}
.inv-model{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:21px;line-height:1;}
.inv-brand{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px;margin-bottom:10px;}
.inv-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.inv-chip{background:var(--surface2);border-radius:3px;padding:2px 7px;font-size:11px;color:var(--muted);}
.inv-price{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:24px;color:var(--accent);}
.inv-footer{display:flex;justify-content:space-between;align-items:flex-end;margin-top:12px;}
.inv-img{width:100%;height:120px;object-fit:cover;border-radius:6px;margin-bottom:10px;border:1px solid var(--border);}
.inv-img-placeholder{width:100%;height:80px;display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:10px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:26px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}
.modal-lg{max-width:680px;}
.modal-xl{max-width:820px;}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;letter-spacing:1px;text-transform:uppercase;margin-bottom:18px;color:var(--accent);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border);}

/* QUOTE */
.quote-result{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:14px;}
.quote-big{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:32px;color:var(--accent);}
.quote-detail{font-size:12px;color:var(--muted);margin-top:3px;}
.quote-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;}
.quote-row:last-child{border-bottom:none;}
.quote-row-label{color:var(--muted);}

/* CALENDAR */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cal-month{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;letter-spacing:1px;text-transform:uppercase;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.cal-day-name{text-align:center;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:4px 0;}
.cal-day{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:7px 6px;min-height:66px;}
.cal-day.today{border-color:var(--accent);}
.cal-day.other-month{opacity:.3;}
.cal-day-num{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;margin-bottom:3px;}
.cal-event{font-size:10px;border-radius:2px;padding:1px 4px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:700;}
.cal-event.confirmada{background:#22c55e;color:#fff;}
.cal-event.pendiente{background:#f59e0b;color:#000;}
.cal-event.cancelada{background:#ef4444;color:#fff;}

/* NOTIFICATIONS */
.notif-bell{position:relative;cursor:pointer;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:16px;}
.notif-dot{position:absolute;top:4px;right:4px;width:8px;height:8px;border-radius:50%;background:var(--danger);border:2px solid var(--surface);display:none;}
.notif-dot.show{display:block;}
.notif-panel{position:fixed;top:58px;right:16px;width:320px;background:var(--surface);border:1px solid var(--border);border-radius:10px;z-index:300;box-shadow:0 8px 32px rgba(0,0,0,.4);max-height:420px;overflow-y:auto;}
.notif-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--surface);}
.notif-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;letter-spacing:1px;text-transform:uppercase;}
.notif-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.notif-item:hover{background:var(--surface2);}
.notif-item.unread{border-left:3px solid var(--accent);}
.notif-item-title{font-weight:600;font-size:13px;}
.notif-item-body{font-size:12px;color:var(--muted);margin-top:2px;}
.notif-item-time{font-size:11px;color:var(--muted);margin-top:3px;}
.notif-empty{padding:24px;text-align:center;color:var(--muted);font-size:13px;}

/* ROLES */
.role-badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.role-gerente{background:#f5c51822;color:#f5c518;border:1px solid #f5c51844;}
.role-vendedor{background:#3b82f622;color:#3b82f6;border:1px solid #3b82f644;}
.users-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.user-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px;}
.user-card-avatar{width:44px;height:44px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;color:#0f0e0b;margin-bottom:10px;}
.user-card-name{font-weight:600;font-size:14px;}
.user-card-email{font-size:11px;color:var(--muted);margin-top:2px;margin-bottom:10px;}

/* ACTIVITY LOG */
.activity-log{border-left:2px solid var(--border);padding-left:16px;margin-top:8px;}
.activity-log-item{position:relative;padding-bottom:14px;}
.activity-log-item::before{content:'';position:absolute;left:-20px;top:5px;width:8px;height:8px;border-radius:50%;background:var(--accent);border:2px solid var(--surface);}
.activity-log-text{font-size:13px;}
.activity-log-time{font-size:11px;color:var(--muted);margin-top:2px;}

/* CHARTS */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:24px;}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px;}
.chart-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:15px;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;color:var(--muted);}

/* META */
.meta-bar-wrap{background:var(--surface2);border-radius:6px;height:12px;overflow:hidden;margin-top:6px;}
.meta-bar{height:100%;border-radius:6px;background:var(--accent);transition:width .5s;}

/* REMINDER */
.reminder-badge{background:#a855f722;color:#a855f7;border:1px solid #a855f744;padding:2px 8px;border-radius:3px;font-size:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;display:inline-block;}

/* COMMISSIONS */
.comm-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px;text-align:center;}
.comm-value{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:30px;color:var(--accent);}
.comm-label{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:4px;}

/* WHATSAPP TEMPLATES */
.template-card{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .15s;}
.template-card:hover{border-color:var(--accent);}
.template-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.template-preview{font-size:12px;color:var(--muted);line-height:1.5;}

/* DETAIL PANEL */
.two-col{display:grid;grid-template-columns:1fr 360px;gap:20px;}
.detail-panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;max-height:85vh;overflow-y:auto;}
.detail-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}

/* MISC */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--muted);}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-right:12px;}
.empty{text-align:center;padding:36px;color:var(--muted);font-size:13px;}
.activity-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.activity-item:last-child{border-bottom:none;}
.activity-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);margin-top:5px;flex-shrink:0;}
.activity-time{font-size:11px;color:var(--muted);margin-top:2px;}
.toast{position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:1px;z-index:999;animation:fadeIn .2s ease;color:#fff;}
.toast.success{background:#22c55e;}
.toast.danger{background:#ef4444;}
.toast.info{background:#3b82f6;}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeIn .2s ease;}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">MotoCRM</div>
    <div class="auth-sub">Sistema de Ventas</div>
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Iniciar Sesión</div>
      <div class="auth-tab" id="tab-register" onclick="switchTab('register')">Registrarse</div>
    </div>
    <div id="auth-msg" class="hidden"></div>
    <div id="auth-name-row" class="form-row hidden">
      <label class="form-label">Nombre completo</label>
      <input class="form-input" id="auth-name" placeholder="Esteban Reyes"/>
    </div>

function toggleTheme() {

// ── DASHBOARD ─────────────────────────────────────────
function renderDashboard() {
  const {leads,inventory,quotes,appts}=STATE;
  const cerrados=leads.filter(l=>l.status==='Cerrado');
  const totalV=cerrados.reduce((a,l)=>a+Number(l.budget||0),0);
  const disp=inventory.filter(i=>i.status==='Disponible').length;
  const thisMonth=new Date().toISOString().slice(0,7);
  const ventasMes=cerrados.filter(l=>(l.date||'').startsWith(thisMonth)).length;
  const metaPct=Math.min(Math.round((ventasMes/META_MENSUAL)*100),100);
  // reminders: leads stalled >3 days in non-closed stage
  const stalled=leads.filter(l=>l.status!=='Cerrado'&&daysSince(l.updated_at||l.date)>3);

  const kpis=[
    {label:'Leads Totales',value:leads.length,delta:`${leads.filter(l=>l.status==='Nuevo').length} nuevos`,icon:'◉'},
    {label:'En Pipeline',value:leads.filter(l=>l.status!=='Cerrado').length,delta:'activos',icon:'⬡'},
    {label:'Ventas Cerradas',value:cerrados.length,delta:fmtMXN(totalV),icon:'✓'},
    {label:'Motos Disponibles',value:disp,delta:`de ${inventory.length} en stock`,icon:'🏍'},
  ];
  let html=`<div class="kpi-row">${kpis.map(k=>`<div class="kpi-card"><div class="kpi-icon">${k.icon}</div><div class="kpi-label">${k.label}</div><div class="kpi-value">${k.value}</div><div class="kpi-delta">${k.delta}</div></div>`).join('')}</div>`;

  // Meta mensual
  html+=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;gap:20px">
    <div style="flex:1">
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px">Meta mensual — ${ventasMes} de ${META_MENSUAL} ventas</div>
      <div class="meta-bar-wrap"><div class="meta-bar" style="width:${metaPct}%"></div></div>
    </div>
    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:32px;color:${metaPct>=100?'var(--success)':'var(--accent)'}">${metaPct}%</div>
  </div>`;

  // Reminders alert
  if(stalled.length>0) {
    html+=`<div style="background:#f59e0b18;border:1px solid #f59e0b44;border-radius:8px;padding:14px 18px;margin-bottom:24px;display:flex;align-items:center;gap:12px">
      <span style="font-size:20px">⏰</span>
      <div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;color:#f59e0b;letter-spacing:1px;text-transform:uppercase">${stalled.length} prospecto${stalled.length>1?'s':''} sin actividad por +3 días</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">${stalled.map(l=>l.name).join(', ')}</div>
      </div>
      <button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="navigate('leads')">Ver →</button>
    </div>`;
  }

  // Pipeline mini
  html+=`<div class="section-header"><div class="section-title">Pipeline de Ventas</div><button class="btn btn-ghost btn-sm" onclick="navigate('pipeline')">Ver completo →</button></div>`;
  html+=`<div class="pipeline-mini">${STAGES.map(st=>{
    const sl=leads.filter(l=>l.status===st);
    return `<div class="stage-col"><div class="stage-header" style="color:${STAGE_COLOR[st]}">${st}<span class="stage-count">${sl.length}</span></div>${sl.slice(0,3).map(l=>`<div class="mini-lead" style="border-left-color:${STAGE_COLOR[st]}"><div class="mini-lead-name">${esc(l.name?.split(' ')[0])}</div><div class="mini-lead-moto">${esc(l.moto)}</div></div>`).join('')}</div>`;
  }).join('')}</div>`;

  // Bottom row
  html+=`<div style="display:grid;grid-template-columns:1fr 1fr 300px;gap:18px">`;
  html+=`<div><div class="section-header"><div class="section-title">Cotizaciones</div><button class="btn btn-ghost btn-sm" onclick="navigate('quotes')">Ver →</button></div><div class="table-wrap"><table><thead><tr><th>Cliente</th><th>Moto</th><th>Estado</th></tr></thead><tbody>${quotes.length===0?`<tr><td colspan="3"><div class="empty">Sin cotizaciones</div></td></tr>`:quotes.slice(0,4).map(q=>`<tr><td style="font-weight:600">${esc(q.lead_name)}</td><td style="color:var(--muted);font-size:12px">${esc(q.moto)}</td><td>${quoteBadge(q.status)}</td></tr>`).join('')}</tbody></table></div></div>`;
  html+=`<div><div class="section-header"><div class="section-title">Próximas Citas</div><button class="btn btn-ghost btn-sm" onclick="navigate('agenda')">Ver →</button></div><div class="table-wrap"><table><thead><tr><th>Cliente</th><th>Tipo</th><th>Fecha</th></tr></thead><tbody>${appts.length===0?`<tr><td colspan="3"><div class="empty">Sin citas</div></td></tr>`:appts.slice(0,4).map(a=>`<tr><td style="font-weight:600">${esc(a.lead_name)}</td><td style="font-size:12px;color:var(--muted)">${esc(a.type)}</td><td style="font-size:12px">${esc(a.date)}</td></tr>`).join('')}</tbody></table></div></div>`;
  const recentLeads=STATE.leads.slice(0,5);
  html+=`<div><div class="section-header"><div class="section-title">Últimos Prospectos</div></div><div class="table-wrap" style="padding:2px 14px">${recentLeads.length===0?`<div class="empty">Sin prospectos</div>`:recentLeads.map(l=>`<div class="activity-item"><div class="activity-dot" style="background:${STAGE_COLOR[l.status]||'var(--accent)'}"></div><div><div style="font-size:13px;font-weight:600">${esc(l.name)}</div><div class="activity-time">${esc(l.moto)} · ${stageBadge(l.status)}</div></div></div>`).join('')}</div></div>`;
  html+=`</div>`;
  return html;
}

        <a href="https://wa.me/52${(l.phone||'').replace(/\D/g,'')}" target="_blank" class="btn btn-wa btn-sm">WA</a>

    html+=`<tr onclick="selectQuote('${q.id}')">

function toggleCalView(){calView=!calView;renderTopbarActions();renderPage();}
function renderAgenda() {
  const {appts}=STATE;
  const todayStr=today();
  if(!calView){
    return `<div class="table-wrap"><table><thead><tr><th>#</th><th>Cliente</th><th>Tipo</th><th>Moto</th><th>Fecha</th><th>Hora</th><th>Notas</th><th>Estado</th></tr></thead><tbody>${appts.length===0?`<tr><td colspan="8"><div class="empty">Sin citas agendadas</div></td></tr>`:appts.map((a,i)=>`<tr>
      <td style="color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:700">${String(i+1).padStart(2,'0')}</td>
      <td style="font-weight:600">${esc(a.lead_name)}</td><td>${esc(a.type)}</td>
      <td style="color:var(--muted)">${esc(a.moto||'—')}</td>
      <td style="color:${a.date===todayStr?'var(--accent)':''}">${esc(a.date||'')}</td>
      <td>${esc(a.time||'')}</td>
      <td style="color:var(--muted);font-size:12px">${esc(a.notes||'—')}</td>
      <td><select class="form-select" style="padding:3px 8px;font-size:12px;width:auto" onchange="updateApptStatus('${a.id}',this.value)">${['Pendiente','Confirmada','Cancelada'].map(s=>`<option${a.status===s?' selected':''}>${s}</option>`).join('')}</select></td>
    </tr>`).join('')}</tbody></table></div>`;
  }
  const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const DAYS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const totalDays=new Date(calYear,calMonth+1,0).getDate();
  let days=[];
  for(let i=0;i<firstDay;i++) days.push({d:new Date(calYear,calMonth,-firstDay+i+1),cur:false});
  for(let i=1;i<=totalDays;i++) days.push({d:new Date(calYear,calMonth,i),cur:true});
  while(days.length%7!==0){const last=days[days.length-1].d;days.push({d:new Date(last.getFullYear(),last.getMonth(),last.getDate()+1),cur:false});}
  return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px">
    <div class="cal-header">
      <button class="btn btn-ghost btn-sm" onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderPage()">‹</button>
      <div class="cal-month">${MONTHS[calMonth]} ${calYear}</div>
      <button class="btn btn-ghost btn-sm" onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderPage()">›</button>
    </div>
    <div class="cal-grid">${DAYS.map(d=>`<div class="cal-day-name">${d}</div>`).join('')}${days.map(({d,cur})=>{
      const ds=d.toISOString().slice(0,10);
      const da=appts.filter(a=>a.date===ds);
      return `<div class="cal-day${!cur?' other-month':''}${ds===todayStr?' today':''}"><div class="cal-day-num">${d.getDate()}</div>${da.map(a=>`<div class="cal-event ${(a.status||'').toLowerCase()}" title="${esc(a.lead_name)}">${esc(a.time||'')} ${esc(a.lead_name?.split(' ')[0]||'')}</div>`).join('')}</div>`;
    }).join('')}</div>
  </div>`;
}

function renderReportes() {
  const {leads,clients,inventory}=STATE;

  const tasaConv=leads.length>0?Math.round((cerrados.length/leads.length)*100):0;
  const ticketProm=cerrados.length>0?Math.round(totalV/cerrados.length):0;
  const motaMasKw=leads.reduce((acc,l)=>{if(l.moto){acc[l.moto]=(acc[l.moto]||0)+1;}return acc;},{});
  const topMoto=Object.entries(motaMasKw).sort((a,b)=>b[1]-a[1])[0];

  return `
  <div class="kpi-row">
    ${[
      {label:'Tasa de Conversión',value:tasaConv+'%',delta:`${cerrados.length} de ${leads.length} leads`,icon:'◎'},
      {label:'Ticket Promedio',value:'$'+Math.round(ticketProm/1000)+'K',delta:fmtMXN(ticketProm),icon:'◑'},
      {label:'Total Facturado',value:'$'+Math.round(totalV/1000)+'K',delta:fmtMXN(totalV),icon:'✓'},
      {label:'Moto Más Pedida',value:topMoto?topMoto[0].split(' ')[1]||'—':'—',delta:topMoto?topMoto[0]:'Sin datos',icon:'🏍'},
    ].map(k=>`<div class="kpi-card"><div class="kpi-icon">${k.icon}</div><div class="kpi-label">${k.label}</div><div class="kpi-value" style="font-size:28px">${k.value}</div><div class="kpi-delta">${k.delta}</div></div>`).join('')}
  </div>

  </div>`;
}

function initCharts() {
  const {leads,inventory}=STATE;
  const accent='rgba(245,197,24,';
  const CHART_DEFAULTS={color:'#7a7465',borderColor:'#2e2c24',backgroundColor:'#1a1915'};

  // Etapas
  const etapaData=STAGES.map(s=>leads.filter(l=>l.status===s).length);
  const c1=document.getElementById('chart-etapas');
  if(c1&&!charts.etapas){charts.etapas=new Chart(c1,{type:'bar',data:{labels:STAGES,datasets:[{data:etapaData,backgroundColor:STAGES.map(s=>STAGE_COLOR[s]+'99'),borderColor:STAGES.map(s=>STAGE_COLOR[s]),borderWidth:1}]},options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#7a7465'}},y:{ticks:{color:'#7a7465',stepSize:1},grid:{color:'#2e2c24'}}}}});}

  // Ventas por mes (últimos 6 meses)
  const meses=[];const ventasM=[];
  for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);const key=d.toISOString().slice(0,7);meses.push(d.toLocaleString('es-MX',{month:'short'}));ventasM.push(leads.filter(l=>l.status==='Cerrado'&&(l.date||'').startsWith(key)).length);}
  const c2=document.getElementById('chart-ventas');
  if(c2&&!charts.ventas){charts.ventas=new Chart(c2,{type:'line',data:{labels:meses,datasets:[{data:ventasM,borderColor:'#f5c518',backgroundColor:'rgba(245,197,24,.1)',tension:.4,fill:true,pointBackgroundColor:'#f5c518'}]},options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#7a7465'}},y:{ticks:{color:'#7a7465',stepSize:1},grid:{color:'#2e2c24'}}}}});}

  // Motos más pedidas
  const motoMap={};leads.forEach(l=>{if(l.moto){const k=l.moto.split(' ').slice(0,2).join(' ');motoMap[k]=(motoMap[k]||0)+1;}});
  const topMotos=Object.entries(motoMap).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const c3=document.getElementById('chart-motos');
  if(c3&&!charts.motos){charts.motos=new Chart(c3,{type:'doughnut',data:{labels:topMotos.map(m=>m[0]),datasets:[{data:topMotos.map(m=>m[1]),backgroundColor:['#f5c518','#3b82f6','#22c55e','#a855f7','#ef4444','#f59e0b'],borderWidth:0}]},options:{plugins:{legend:{position:'right',labels:{color:'#7a7465',font:{size:11}}}}}});}

  // Inventario
  const invStatus={Disponible:inventory.filter(i=>i.status==='Disponible').length,Apartada:inventory.filter(i=>i.status==='Apartada').length,Vendida:inventory.filter(i=>i.status==='Vendida').length};
  const c4=document.getElementById('chart-inv');
  if(c4&&!charts.inv){charts.inv=new Chart(c4,{type:'doughnut',data:{labels:Object.keys(invStatus),datasets:[{data:Object.values(invStatus),backgroundColor:['#22c55e99','#f59e0b99','#ef444499'],borderColor:['#22c55e','#f59e0b','#ef4444'],borderWidth:1}]},options:{plugins:{legend:{position:'right',labels:{color:'#7a7465',font:{size:11}}}}}});}
}

async function exportReportePDF() {
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const {leads,inventory,clients}=STATE;
  const cerrados=leads.filter(l=>l.status==='Cerrado');
  const totalV=cerrados.reduce((a,l)=>a+Number(l.budget||0),0);
  const thisMonth=new Date().toLocaleString('es-MX',{month:'long',year:'numeric'});

  doc.setFillColor(15,14,11); doc.rect(0,0,210,35,'F');
  doc.setTextColor(245,197,24); doc.setFont('helvetica','bold'); doc.setFontSize(24);
  doc.text('MOTOCRM',14,18);
  doc.setFontSize(10); doc.setTextColor(180,170,150); doc.setFont('helvetica','normal');
  doc.text(`Reporte Mensual — ${thisMonth}`,14,27);
  doc.text(`Generado: ${new Date().toLocaleDateString('es-MX')}`,150,27);

  const kpis=[
    ['Total Leads',leads.length],['Ventas Cerradas',cerrados.length],
    ['Facturación Total',fmtMXN(totalV)],['Motos Disponibles',inventory.filter(i=>i.status==='Disponible').length],
  ];
  let y=50;
  doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor(30,30,30);
  doc.text('RESUMEN EJECUTIVO',14,y); doc.setDrawColor(245,197,24); doc.line(14,y+2,100,y+2);
  y+=12;
  kpis.forEach(([l,v],i)=>{
    if(i%2===0){doc.setFillColor(245,243,238);doc.rect(12,y-6,186,10,'F');}
    doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(80,80,80); doc.text(l,16,y);
    doc.setFont('helvetica','bold'); doc.setTextColor(20,20,20); doc.text(String(v),194,y,{align:'right'});
    y+=10;
  });

  y+=8;
  doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor(30,30,30);
  doc.text('LEADS POR ETAPA',14,y); doc.line(14,y+2,100,y+2);
  y+=12;
  STAGES.forEach((s,i)=>{
    const cnt=leads.filter(l=>l.status===s).length;
    if(i%2===0){doc.setFillColor(245,243,238);doc.rect(12,y-6,186,10,'F');}
    doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(80,80,80); doc.text(s,16,y);
    doc.setFont('helvetica','bold'); doc.setTextColor(20,20,20); doc.text(String(cnt),194,y,{align:'right'});
    y+=10;

  doc.setFillColor(15,14,11); doc.rect(0,265,210,30,'F');
  doc.setTextColor(245,197,24); doc.setFontSize(9); doc.setFont('helvetica','bold');
  doc.text('MotoCRM — Sistema de Ventas',14,277);
  doc.setTextColor(180,170,150); doc.setFont('helvetica','normal'); doc.setFontSize(8);
  doc.text(`Reporte generado automáticamente el ${new Date().toLocaleString('es-MX')}`,14,285);

  doc.save(`Reporte_MotoCRM_${thisMonth.replace(' ','_')}.pdf`);
  toast('Reporte PDF exportado');
}

  return `

    <div>
      <div class="section-title" style="margin-bottom:14px">Enviar mensaje rápido</div>

      </div>
      <div class="form-row"><label class="form-label">Plantilla</label>
        <select class="form-select" id="wa-template" onchange="previewWA()">
          ${WA_TEMPLATES.map((t,i)=>`<option value="${i}">${t.name}</option>`).join('')}
        </select>
      </div>
      <div class="form-row"><label class="form-label">Mensaje (editable)</label>
        <textarea class="form-textarea" id="wa-msg" style="min-height:100px"></textarea>
      </div>
      <button class="btn btn-success" style="width:100%" onclick="sendWAMessage()">📱 Abrir en WhatsApp</button>
    </div>
    <div>
      <div class="section-title" style="margin-bottom:14px">Plantillas disponibles</div>
      ${WA_TEMPLATES.map((t,i)=>`
        <div class="template-card" onclick="document.getElementById('wa-template').value=${i};previewWA()">
          <div class="template-name">${t.name} <span class="badge" style="background:${STAGE_COLOR[t.stage]||'#64748b'}22;color:${STAGE_COLOR[t.stage]||'#64748b'};border:1px solid ${STAGE_COLOR[t.stage]||'#64748b'}44;font-size:10px">${t.stage}</span></div>
          <div class="template-preview">${t.msg.slice(0,80)}…</div>
        </div>`).join('')}
    </div>
  </div>`;
}
function previewWA() {
  const leadId=document.getElementById('wa-lead')?.value;
  const tplIdx=document.getElementById('wa-template')?.value;
  const lead=STATE.leads.find(l=>l.id===leadId);
  if(!lead||tplIdx===undefined) return;
  let msg=WA_TEMPLATES[tplIdx].msg;
  const mens=STATE.quotes.find(q=>q.lead_name===lead.name);
  const mensVal=mens?fmtMXN(Math.round(calcMens(mens.price,mens.enganche,mens.plazo,mens.tasa))):'consultar';
  msg=msg.replace(/{nombre}/g,lead.name?.split(' ')[0]||'').replace(/{moto}/g,lead.moto||'').replace(/{mensualidad}/g,mensVal);
  document.getElementById('wa-msg').value=msg;
}
function sendWAMessage() {
  const leadId=document.getElementById('wa-lead')?.value;
  const msg=document.getElementById('wa-msg')?.value;
  const lead=STATE.leads.find(l=>l.id===leadId);
  if(!lead||!msg){toast('Selecciona un prospecto y mensaje','danger');return;}
  const phone=(lead.phone||'').replace(/\D/g,'');
  window.open(`https://wa.me/52${phone}?text=${encodeURIComponent(msg)}`,'_blank');
}
function sendQuoteWhatsApp(quoteId) {
  const q=STATE.quotes.find(q=>q.id===quoteId);
  if(!q) return;
  const mens=Math.round(calcMens(q.price,q.enganche,q.plazo,q.tasa));
  const msg=`Hola ${q.lead_name}! Tu cotización para la ${q.moto} está lista 🏍️\n\nPrecio: ${fmtMXN(q.price)}\nEnganche: ${fmtMXN(q.enganche)}\nPago mensual: ${fmtMXN(mens)}\nPlazo: ${q.plazo} meses\n\n¿Te parece bien? Podemos cerrar esta semana. 💪`;
  const lead=STATE.leads.find(l=>l.name===q.lead_name);
  const phone=lead?(lead.phone||'').replace(/\D/g,''):'';
  window.open(`https://wa.me/52${phone}?text=${encodeURIComponent(msg)}`,'_blank');
}

// ── NOTIFICATIONS ─────────────────────────────────────
async function loadNotifs() {
  if(!STATE.user) return;
  const {data}=await sb.from('notifications').select('*').eq('user_id',STATE.user.id).order('created_at',{ascending:false}).limit(30);
  NOTIFS=data||[]; updateNotifBell();
}
function updateNotifBell() {
  const dot=document.getElementById('notif-dot');
  if(!dot) return;
  const unread=NOTIFS.filter(n=>!n.read).length;
  dot.classList.toggle('show',unread>0);
}
function toggleNotifPanel() {
  notifOpen=!notifOpen;
  const panel=document.getElementById('notif-panel');
  if(!notifOpen){panel.classList.add('hidden');return;}
  panel.classList.remove('hidden');
  renderNotifPanel();
}
function renderNotifPanel() {
  const panel=document.getElementById('notif-panel');
  const unread=NOTIFS.filter(n=>!n.read).length;
  let html=`<div class="notif-header"><div class="notif-title">Notificaciones</div><div style="display:flex;gap:6px">${unread>0?`<button class="btn btn-ghost btn-sm" onclick="markAllRead()">Leídas</button>`:''}<button class="btn btn-ghost btn-sm" onclick="toggleNotifPanel()">✕</button></div></div>`;
  if(!NOTIFS.length) html+=`<div class="notif-empty">Sin notificaciones</div>`;
  else html+=NOTIFS.map(n=>`<div class="notif-item${!n.read?' unread':''}" onclick="readNotif('${n.id}')"><div class="notif-item-title">${esc(n.title)}</div><div class="notif-item-body">${esc(n.body)}</div><div class="notif-item-time">${timeAgo(n.created_at)}</div></div>`).join('');
  panel.innerHTML=html;
}
async function readNotif(id) {
  await sb.from('notifications').update({read:true}).eq('id',id);
  const n=NOTIFS.find(n=>n.id===id); if(n) n.read=true;
  updateNotifBell(); renderNotifPanel();
}
async function markAllRead() {
  await sb.from('notifications').update({read:true}).eq('user_id',STATE.user.id).eq('read',false);
  NOTIFS.forEach(n=>n.read=true); updateNotifBell(); renderNotifPanel();
}
async function sendNotifToAll(title,body,type='info') {
  const {data:roles}=await sb.from('user_roles').select('user_id');
  if(!roles||!roles.length) return;
  await sb.from('notifications').insert(roles.map(r=>({user_id:r.user_id,title,body,type,read:false})));
}
function subscribeNotifs() {
  if(!STATE.user) return;
  sb.channel('rt_notifs_user').on('postgres_changes',{event:'INSERT',schema:'public',table:'notifications',filter:`user_id=eq.${STATE.user.id}`},async()=>{
    await loadNotifs(); if(notifOpen) renderNotifPanel();
  }).subscribe();
}
function timeAgo(ts) {
  const diff=(Date.now()-new Date(ts))/1000;
  if(diff<60) return 'Ahora';
  if(diff<3600) return `Hace ${Math.floor(diff/60)} min`;
  if(diff<86400) return `Hace ${Math.floor(diff/3600)} h`;
  return `Hace ${Math.floor(diff/86400)} días`;
}
document.addEventListener('click',e=>{
  if(notifOpen&&!e.target.closest('#notif-panel')&&!e.target.closest('#notif-bell')){
    notifOpen=false; document.getElementById('notif-panel')?.classList.add('hidden');
  }
});

async function convertToClient(leadId) {
  const l=STATE.leads.find(l=>l.id===leadId);
  if(!l) return;
  if(!confirm(`¿Convertir a ${l.name} en cliente? Esto marcará el prospecto como Cerrado.`)) return;
  // Insert to clients
  const {error}=await sb.from('clients').insert([{name:l.name,phone:l.phone,email:l.email||'',moto:l.moto,date:today(),total:Number(l.budget||0)}]);
  if(error){toast('Error: '+error.message,'danger');return;}
  // Update lead status
  await sb.from('leads').update({status:'Cerrado'}).eq('id',leadId);
  await logActivity('Convertido a cliente',l.name,`${l.name} — ${l.moto}`);
  await sendNotifToAll('🎉 Nueva venta cerrada',`${l.name} fue convertido a cliente. Moto: ${l.moto}. ${fmtMXN(l.budget)}`,'success');
  closeModal(); toast('✓ Convertido a cliente exitosamente');
  await loadAll(); renderPage();
}

function previewMens(){

// ── CRUD ──────────────────────────────────────────────
async function saveLead() {
  const name=document.getElementById('f-name')?.value?.trim();
  const phone=document.getElementById('f-phone')?.value?.trim();
  const moto=document.getElementById('f-moto')?.value?.trim();
  const budget=document.getElementById('f-budget')?.value;
  const status=document.getElementById('f-status')?.value;
  const notes=document.getElementById('f-notes')?.value?.trim();
  if(!name||!phone||!moto||!budget){toast('Completa todos los campos','danger');return;}
  const {error}=await sb.from('leads').insert([{name,phone,moto,budget:Number(budget),status,notes,date:today()}]);
  if(error){toast('Error: '+error.message,'danger');console.error(error);return;}
  await logActivity('Nuevo prospecto',name,`${name} — ${moto} — ${fmtMXN(budget)}`);
  await sendNotifToAll('🏍️ Nuevo prospecto',`${name} interesado en ${moto}. Presupuesto: ${fmtMXN(budget)}`,'info');
  closeModal(); toast('Prospecto agregado');
  await loadAll(); renderPage();
}
async function saveMoto() {
  const brand=document.getElementById('f-brand')?.value?.trim();
  const model=document.getElementById('f-model')?.value?.trim();
  const year=document.getElementById('f-year')?.value;
  const price=document.getElementById('f-price')?.value;
  const color=document.getElementById('f-color')?.value?.trim();
  const km=document.getElementById('f-km')?.value;
  const status=document.getElementById('f-inv-status')?.value;
  const cilindraje=document.getElementById('f-cil')?.value?.trim();
  const tipo=document.getElementById('f-tipo')?.value;
  const photo_url=document.getElementById('f-photo')?.value?.trim();
  const descripcion=document.getElementById('f-desc')?.value?.trim();
  if(!brand||!model||!price){toast('Completa los campos requeridos','danger');return;}
  const {error}=await sb.from('inventory').insert([{brand,model,year:Number(year),price:Number(price),color,km:Number(km),status,cilindraje,tipo,photo_url,descripcion}]);
  if(error){toast('Error: '+error.message,'danger');return;}
  await logActivity('Moto agregada',`${brand} ${model}`,`${brand} ${model} ${year} — ${fmtMXN(price)}`);
  closeModal(); toast('Moto agregada');
  await loadAll(); renderPage();
}
async function saveQuote() {
  const lead_name=document.getElementById('f-qlead')?.value;
  const moto=document.getElementById('f-qmoto')?.value;
  const price=document.getElementById('f-qprice')?.value;
  const enganche=document.getElementById('f-qenganche')?.value;
  const plazo=document.getElementById('f-qplazo')?.value;
  const tasa=document.getElementById('f-qtasa')?.value;
  if(!lead_name||!moto||!price||!enganche){toast('Completa los campos requeridos','danger');return;}
  const {error}=await sb.from('quotes').insert([{lead_name,moto,price:Number(price),enganche:Number(enganche),plazo:Number(plazo),tasa:Number(tasa),status:'Borrador',date:today()}]);
  if(error){toast('Error: '+error.message,'danger');return;}
  await logActivity('Cotización creada',lead_name,`${lead_name} — ${moto}`);
  closeModal(); toast('Cotización creada');
  await loadAll(); renderPage();
}
async function saveAppt() {
  const lead_name=document.getElementById('f-alead')?.value;
  const type=document.getElementById('f-atype')?.value;
  const date=document.getElementById('f-adate')?.value;
  const time=document.getElementById('f-atime')?.value;
  const moto=document.getElementById('f-amoto')?.value;
  const notes=document.getElementById('f-anotes')?.value?.trim();
  if(!lead_name||!date||!time){toast('Completa los campos requeridos','danger');return;}
  const {error}=await sb.from('appointments').insert([{lead_name,type,date,time,moto,notes,status:'Pendiente'}]);
  if(error){toast('Error: '+error.message,'danger');return;}
  await logActivity('Cita agendada',lead_name,`${type} — ${lead_name} — ${date} ${time}`);
  closeModal(); toast('Cita agendada');
  await loadAll(); renderPage();
}
async function updateLeadStatus(id,status) {
  await sb.from('leads').update({status,updated_at:new Date().toISOString()}).eq('id',id);
  const l=STATE.leads.find(l=>l.id===id);
  if(l){await logActivity(`Etapa → ${status}`,l.name,`${l.name} movido a ${status}`);}
  toast('Etapa actualizada');
  await loadAll();
}
async function updateMotoStatus(id,status) {
  await sb.from('inventory').update({status}).eq('id',id);
  toast('Estado actualizado');
  await loadAll(); renderPage();
}
async function updateQuoteStatus(id,status) {
  await sb.from('quotes').update({status}).eq('id',id);
  const q=STATE.quotes.find(q=>q.id===id); if(q) q.status=status;
  renderPage();
}
async function updateApptStatus(id,status) {
  await sb.from('appointments').update({status}).eq('id',id);
  toast('Estado actualizado');
  await loadAll(); renderPage();
}
async function deleteLead(id) {
  if(!confirm('¿Eliminar este prospecto?')) return;
  await sb.from('leads').delete().eq('id',id);
  closeModal(); toast('Eliminado','danger');
  await loadAll(); renderPage();
}

// ── PDF ───────────────────────────────────────────────
function generatePDF(quoteId) {
  const q=STATE.quotes.find(q=>q.id===quoteId);
  if(!q) return;
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const mens=Math.round(calcMens(q.price,q.enganche,q.plazo,q.tasa));
  const total=Math.round(q.enganche+mens*q.plazo);
  const intereses=total-q.price;
  doc.setFillColor(15,14,11); doc.rect(0,0,210,40,'F');
  doc.setTextColor(245,197,24); doc.setFontSize(28); doc.setFont('helvetica','bold'); doc.text('MOTOCRM',14,20);
  doc.setFontSize(9); doc.setTextColor(180,170,150); doc.setFont('helvetica','normal'); doc.text('COTIZACIÓN FORMAL',14,28);
  doc.text(`Fecha: ${q.date||today()}`,140,18); doc.text(`Folio: COT-${String(q.id).slice(0,8).toUpperCase()}`,140,24);
  doc.setTextColor(30,30,30); doc.setFontSize(11); doc.setFont('helvetica','bold'); doc.text('CLIENTE',14,52);
  doc.setDrawColor(245,197,24); doc.setLineWidth(0.5); doc.line(14,54,80,54);
  doc.setFont('helvetica','normal'); doc.setFontSize(12); doc.setTextColor(20,20,20); doc.text(q.lead_name||'—',14,62);
  doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(30,30,30); doc.text('VEHÍCULO',14,76);
  doc.line(14,78,80,78); doc.setFont('helvetica','normal'); doc.setFontSize(13); doc.setTextColor(20,20,20); doc.text(q.moto||'—',14,86);
  doc.setFillColor(245,197,24); doc.roundedRect(120,48,76,44,3,3,'F');
  doc.setTextColor(15,14,11); doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.text('PAGO MENSUAL',158,58,{align:'center'});
  doc.setFontSize(22); doc.text(`$${mens.toLocaleString('es-MX')}`,158,72,{align:'center'});
  doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.text(`MXN / ${q.plazo} meses`,158,80,{align:'center'});
  const tableY=100;
  const rows=[['Precio de la moto',`$${Number(q.price).toLocaleString('es-MX')} MXN`],['Enganche',`$${Number(q.enganche).toLocaleString('es-MX')} MXN`],['Monto a financiar',`$${(q.price-q.enganche).toLocaleString('es-MX')} MXN`],['Plazo',`${q.plazo} meses`],['Tasa anual',`${q.tasa}%`],['Pago mensual',`$${mens.toLocaleString('es-MX')} MXN`],['Total a pagar',`$${total.toLocaleString('es-MX')} MXN`],['Intereses totales',`$${intereses.toLocaleString('es-MX')} MXN`]];
  doc.setFontSize(11); doc.setFont('helvetica','bold'); doc.setTextColor(30,30,30); doc.text('DESGLOSE FINANCIERO',14,tableY);
  doc.line(14,tableY+2,100,tableY+2);
  rows.forEach(([label,value],i)=>{
    const y=tableY+12+i*10;
    if(i%2===0){doc.setFillColor(245,243,238);doc.rect(12,y-6,186,10,'F');}
    doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(80,80,80); doc.text(label,16,y);
    doc.setFont('helvetica','bold'); doc.setTextColor(20,20,20); doc.text(value,194,y,{align:'right'});
  });
  doc.setFillColor(15,14,11); doc.rect(0,270,210,30,'F');
  doc.setTextColor(245,197,24); doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.text('MotoCRM — Sistema de Ventas',14,280);
  doc.setFont('helvetica','normal'); doc.setTextColor(180,170,150); doc.setFontSize(8);
  doc.text('Esta cotización es informativa. Los valores pueden variar según condiciones de financiamiento vigentes.',14,288);
  doc.save(`Cotizacion_${(q.lead_name||'cliente').replace(/\s/g,'_')}.pdf`);
  toast('PDF generado');
}

// ── EXCEL ─────────────────────────────────────────────
function exportExcel(type) {
  const wb=XLSX.utils.book_new();
  const all={leads:STATE.leads,inventory:STATE.inventory,clients:STATE.clients,quotes:STATE.quotes,appts:STATE.appts};
  const names={leads:'Prospectos',inventory:'Inventario',clients:'Clientes',quotes:'Cotizaciones',appts:'Agenda'};
  const targets=type==='all'?Object.keys(all):[type];
  targets.forEach(k=>{const ws=XLSX.utils.json_to_sheet(all[k]);XLSX.utils.book_append_sheet(wb,ws,names[k]);});
  XLSX.writeFile(wb,type==='all'?'MotoCRM_Completo.xlsx':`MotoCRM_${names[type]}.xlsx`);
  toast('Excel exportado');
}
